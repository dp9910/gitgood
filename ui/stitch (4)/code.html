<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Knowledge Check Quiz - GitGood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-0"></div>
<!-- Quiz Modal -->
<div class="relative z-10 w-full max-w-2xl bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Header -->
<div class="px-8 pt-8 pb-6 border-b border-slate-100 dark:border-slate-800">
<div class="flex justify-between items-center mb-6">
<div class="flex items-center space-x-2 text-primary">
<span class="material-icons text-xl">psychology</span>
<span class="text-xs font-bold uppercase tracking-wider">GitGood AI Learning</span>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-icons">close</span>
</button>
</div>
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<h1 class="text-2xl font-bold text-slate-900 dark:text-white">Knowledge Check: Backpropagation</h1>
<!-- Progress Indicator -->
<div class="flex items-center space-x-2">
<span class="text-sm font-medium text-slate-500 dark:text-slate-400 mr-2">2 / 5</span>
<div class="flex space-x-1.5">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
<div class="w-2.5 h-2.5 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="w-2.5 h-2.5 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="w-2.5 h-2.5 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
</div>
</div>
</div>
<!-- Question Body -->
<div class="px-8 py-8">
<div class="mb-8">
<h2 class="text-xl font-semibold text-slate-800 dark:text-slate-100 leading-relaxed">
                    What is the chain rule used for in the context of neural network training?
                </h2>
</div>
<!-- Answer Options -->
<div class="space-y-4">
<!-- Option A (Selected State Example) -->
<label class="relative flex items-center p-4 border-2 border-primary bg-primary/5 rounded-xl cursor-pointer group transition-all">
<input checked="" class="hidden" name="quiz-option" type="radio"/>
<div class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-white font-bold text-lg">
                        A
                    </div>
<div class="ml-4 flex-grow">
<p class="text-slate-900 dark:text-white font-medium">Calculating the derivative of a composite function.</p>
</div>
<div class="flex-shrink-0">
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
</div>
</label>
<!-- Option B -->
<label class="relative flex items-center p-4 border-2 border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl cursor-pointer group transition-all">
<input class="hidden" name="quiz-option" type="radio"/>
<div class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-lg group-hover:bg-primary/10 group-hover:text-primary">
                        B
                    </div>
<div class="ml-4 flex-grow">
<p class="text-slate-700 dark:text-slate-300 font-medium">Initializing weights in a neural network.</p>
</div>
<div class="flex-shrink-0">
<div class="w-6 h-6 rounded-full border-2 border-slate-200 dark:border-slate-700"></div>
</div>
</label>
<!-- Option C -->
<label class="relative flex items-center p-4 border-2 border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl cursor-pointer group transition-all">
<input class="hidden" name="quiz-option" type="radio"/>
<div class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-lg group-hover:bg-primary/10 group-hover:text-primary">
                        C
                    </div>
<div class="ml-4 flex-grow">
<p class="text-slate-700 dark:text-slate-300 font-medium">Normalizing input data before training.</p>
</div>
<div class="flex-shrink-0">
<div class="w-6 h-6 rounded-full border-2 border-slate-200 dark:border-slate-700"></div>
</div>
</label>
<!-- Option D -->
<label class="relative flex items-center p-4 border-2 border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl cursor-pointer group transition-all">
<input class="hidden" name="quiz-option" type="radio"/>
<div class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold text-lg group-hover:bg-primary/10 group-hover:text-primary">
                        D
                    </div>
<div class="ml-4 flex-grow">
<p class="text-slate-700 dark:text-slate-300 font-medium">Defining the loss function for regression tasks.</p>
</div>
<div class="flex-shrink-0">
<div class="w-6 h-6 rounded-full border-2 border-slate-200 dark:border-slate-700"></div>
</div>
</label>
</div>
</div>
<!-- Footer -->
<div class="px-8 py-6 bg-slate-50 dark:bg-slate-800/30 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
<button class="text-slate-500 dark:text-slate-400 font-semibold hover:text-slate-700 dark:hover:text-slate-200 flex items-center transition-colors">
<span class="material-icons mr-1">chevron_left</span>
                Previous
            </button>
<button class="bg-primary hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg shadow-primary/25 transition-all flex items-center">
                Submit Answer
                <span class="material-icons ml-2">arrow_forward</span>
</button>
</div>
</div>
<!-- Decorative Elements -->
<div class="fixed top-10 left-10 w-64 h-64 bg-primary/10 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-10 right-10 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
